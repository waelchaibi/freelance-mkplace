<app-page-header
  title="Messaging center"
  subtitle="Open an order to chat with the client or assigned freelancer."
/>

<table mat-table [dataSource]="orders()" class="messages-table">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>#</th>
    <td mat-cell *matCellDef="let order">{{ order.id }}</td>
  </ng-container>

  <ng-container matColumnDef="client">
    <th mat-header-cell *matHeaderCellDef>Client</th>
    <td mat-cell *matCellDef="let order">{{ order.clientName }}</td>
  </ng-container>

  <ng-container matColumnDef="freelancer">
    <th mat-header-cell *matHeaderCellDef>Freelancer</th>
    <td mat-cell *matCellDef="let order">{{ order.assignedFreelancerName ?? '—' }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let order">
      <app-status-chip [status]="order.status" />
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let order">
      <button mat-flat-button color="primary" type="button" (click)="openChat(order)">Open chat</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr
    mat-row
    *matRowDef="let row; columns: displayedColumns"
    class="clickable-row"
    (click)="openChat(row)"
  ></tr>
</table>

@if (orders().length === 0) {
  <p class="empty">No orders yet. Clients must create orders before messaging is available.</p>
}
