<app-page-header title="Gestion des projets" subtitle="CRUD, assignation et suivi des projets.">
  <button mat-flat-button color="primary" type="button" (click)="openCreate()">Créer</button>
  <button mat-stroked-button type="button" (click)="openAssignWizard()">Assistant assignation</button>
</app-page-header>

<mat-form-field appearance="outline" class="filter">
  <mat-label>Statut</mat-label>
  <mat-select [formControl]="statusControl">
    @for (opt of statusOptions; track opt.value) {
      <mat-option [value]="opt.value">{{ opt.label }}</mat-option>
    }
  </mat-select>
</mat-form-field>

<table mat-table [dataSource]="filteredOrders()" class="orders-table">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>#</th>
    <td mat-cell *matCellDef="let order">{{ order.id }}</td>
  </ng-container>

  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef>Titre</th>
    <td mat-cell *matCellDef="let order">{{ order.title }}</td>
  </ng-container>

  <ng-container matColumnDef="client">
    <th mat-header-cell *matHeaderCellDef>Client</th>
    <td mat-cell *matCellDef="let order">{{ order.clientName }}</td>
  </ng-container>

  <ng-container matColumnDef="freelancer">
    <th mat-header-cell *matHeaderCellDef>Freelancer</th>
    <td mat-cell *matCellDef="let order">{{ order.assignedFreelancerName ?? '—' }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Statut</th>
    <td mat-cell *matCellDef="let order">
      <app-status-chip [status]="order.status" />
    </td>
  </ng-container>

  <ng-container matColumnDef="deadline">
    <th mat-header-cell *matHeaderCellDef>Échéance</th>
    <td mat-cell *matCellDef="let order">{{ order.deadline ? (order.deadline | date: 'mediumDate') : '—' }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let order">
      <button mat-button type="button" (click)="$event.stopPropagation(); openEdit(order)">Modifier</button>
      <button mat-button type="button" (click)="$event.stopPropagation(); deleteOrder(order)">Supprimer</button>
      <a mat-button (click)="$event.stopPropagation(); openOrder(order)">Ouvrir</a>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr
    mat-row
    *matRowDef="let row; columns: displayedColumns"
    class="clickable-row"
    (click)="openOrder(row)"
  ></tr>
</table>
