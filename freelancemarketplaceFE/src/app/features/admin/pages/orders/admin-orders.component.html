<app-page-header title="Orders" subtitle="Assign freelancers and track order progress." />

<mat-form-field appearance="outline" class="filter">
  <mat-label>Status</mat-label>
  <mat-select [formControl]="statusControl">
    @for (opt of statusOptions; track opt.value) {
      <mat-option [value]="opt.value">{{ opt.label }}</mat-option>
    }
  </mat-select>
</mat-form-field>

<table mat-table [dataSource]="filteredOrders()" class="orders-table">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>#</th>
    <td mat-cell *matCellDef="let order">{{ order.id }}</td>
  </ng-container>

  <ng-container matColumnDef="client">
    <th mat-header-cell *matHeaderCellDef>Client</th>
    <td mat-cell *matCellDef="let order">{{ order.clientName }}</td>
  </ng-container>

  <ng-container matColumnDef="freelancer">
    <th mat-header-cell *matHeaderCellDef>Freelancer</th>
    <td mat-cell *matCellDef="let order">{{ order.assignedFreelancerName ?? '—' }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let order">
      <app-status-chip [status]="order.status" />
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let order">
      <button mat-stroked-button type="button" (click)="$event.stopPropagation(); openAssign(order)">
        Assign
      </button>
      <a mat-button (click)="$event.stopPropagation(); openOrder(order)">Open</a>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr
    mat-row
    *matRowDef="let row; columns: displayedColumns"
    class="clickable-row"
    (click)="openOrder(row)"
  ></tr>
</table>
