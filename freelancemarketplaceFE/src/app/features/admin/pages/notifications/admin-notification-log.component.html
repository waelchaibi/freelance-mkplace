<app-page-header
  title="Notifications envoyées"
  subtitle="Historique des notifications et statut de livraison email (simulé)."
/>

<table mat-table [dataSource]="logs()" class="log-table">
  <ng-container matColumnDef="recipient">
    <th mat-header-cell *matHeaderCellDef>Destinataire</th>
    <td mat-cell *matCellDef="let row">{{ row.recipientName }} ({{ row.recipientEmail }})</td>
  </ng-container>

  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef>Titre</th>
    <td mat-cell *matCellDef="let row">{{ row.title }}</td>
  </ng-container>

  <ng-container matColumnDef="emailDeliveryStatus">
    <th mat-header-cell *matHeaderCellDef>Email</th>
    <td mat-cell *matCellDef="let row">{{ row.emailDeliveryStatus }}</td>
  </ng-container>

  <ng-container matColumnDef="read">
    <th mat-header-cell *matHeaderCellDef>Lu</th>
    <td mat-cell *matCellDef="let row">{{ row.read ? 'Oui' : 'Non' }}</td>
  </ng-container>

  <ng-container matColumnDef="createdAt">
    <th mat-header-cell *matHeaderCellDef>Date</th>
    <td mat-cell *matCellDef="let row">{{ row.createdAt | date: 'medium' }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
