<app-page-header title="Mon profil" subtitle="Modifier vos informations et votre mot de passe." />

<div class="profile-layout">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Informations du compte</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="profileForm" class="form">
        <mat-form-field appearance="outline">
          <mat-label>Nom complet</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" />
        </mat-form-field>

        @if (profile(); as p) {
          <p class="meta"><strong>Rôle :</strong> {{ frRole(p.role) }}</p>
        }

        <button mat-flat-button color="primary" type="button" (click)="saveProfile()" [disabled]="profileSaving">
          Enregistrer
        </button>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card>
    <mat-card-header>
      <mat-card-title>Changer le mot de passe</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="passwordForm" class="form">
        <mat-form-field appearance="outline">
          <mat-label>Mot de passe actuel</mat-label>
          <input matInput type="password" formControlName="currentPassword" autocomplete="current-password" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Nouveau mot de passe</mat-label>
          <input matInput type="password" formControlName="newPassword" autocomplete="new-password" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Confirmer le mot de passe</mat-label>
          <input matInput type="password" formControlName="confirmPassword" autocomplete="new-password" />
        </mat-form-field>

        <button mat-flat-button color="primary" type="button" (click)="changePassword()" [disabled]="passwordSaving">
          Mettre à jour
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
