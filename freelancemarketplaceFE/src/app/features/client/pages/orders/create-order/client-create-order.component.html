<app-page-header title="New service request" subtitle="Describe what you need. Admin will review and assign a freelancer." />

<mat-card>
  @if (selectedService(); as service) {
    <mat-card-content class="service-summary">
      <strong>{{ service.title }}</strong>
      <span>by {{ service.freelancerName }}</span>
    </mat-card-content>
  }

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <mat-form-field appearance="outline">
        <mat-label>Request details</mat-label>
        <textarea matInput rows="5" formControlName="description"></textarea>
        @if (form.controls.description.touched && form.controls.description.hasError('required')) {
          <mat-error>Description is required</mat-error>
        }
      </mat-form-field>

      <div class="actions">
        <button mat-flat-button color="primary" type="submit" [disabled]="loading">Submit request</button>
        <a mat-button routerLink="/client/services">Cancel</a>
      </div>
    </form>
  </mat-card-content>
</mat-card>
