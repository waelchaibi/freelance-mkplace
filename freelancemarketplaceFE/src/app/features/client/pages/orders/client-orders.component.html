<app-page-header title="My orders" subtitle="Track progress and message admin about each request.">
  <a mat-flat-button color="primary" routerLink="/client/orders/new">New request</a>
</app-page-header>

<mat-form-field appearance="outline" class="filter">
  <mat-label>Status</mat-label>
  <mat-select [formControl]="statusControl">
    @for (opt of statusOptions; track opt.value) {
      <mat-option [value]="opt.value">{{ opt.label }}</mat-option>
    }
  </mat-select>
</mat-form-field>

<table mat-table [dataSource]="filteredOrders()" class="orders-table">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>#</th>
    <td mat-cell *matCellDef="let row">{{ row.id }}</td>
  </ng-container>

  <ng-container matColumnDef="service">
    <th mat-header-cell *matHeaderCellDef>Service</th>
    <td mat-cell *matCellDef="let row">{{ row.serviceTitle ?? 'Custom request' }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let row"><app-status-chip [status]="row.status" /></td>
  </ng-container>

  <ng-container matColumnDef="freelancer">
    <th mat-header-cell *matHeaderCellDef>Freelancer</th>
    <td mat-cell *matCellDef="let row">{{ row.assignedFreelancerName ?? '—' }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let row">
      <a mat-button (click)="$event.stopPropagation(); openOrder(row)">Open</a>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr
    mat-row
    *matRowDef="let row; columns: displayedColumns"
    class="clickable-row"
    (click)="openOrder(row)"
  ></tr>
</table>

@if (filteredOrders().length === 0) {
  <p class="empty">No orders found for this filter.</p>
}
