<app-page-header
  title="Dashboard"
  subtitle="Overview of your service requests and quick actions."
/>

<div class="stats">
  <mat-card>
    <mat-card-title>Total orders</mat-card-title>
    <mat-card-content><span class="stat">{{ orders().length }}</span></mat-card-content>
  </mat-card>
  <mat-card>
    <mat-card-title>Pending</mat-card-title>
    <mat-card-content
      ><span class="stat">{{ countByStatus(OrderStatus.PENDING) }}</span></mat-card-content
    >
  </mat-card>
  <mat-card>
    <mat-card-title>In progress</mat-card-title>
    <mat-card-content
      ><span class="stat">{{ countByStatus(OrderStatus.IN_PROGRESS) }}</span></mat-card-content
    >
  </mat-card>
  <mat-card>
    <mat-card-title>Done</mat-card-title>
    <mat-card-content><span class="stat">{{ countByStatus(OrderStatus.DONE) }}</span></mat-card-content>
  </mat-card>
</div>

<div class="actions">
  <a mat-flat-button color="primary" routerLink="/client/services">Browse services</a>
  <a mat-stroked-button routerLink="/client/orders">View my orders</a>
</div>
