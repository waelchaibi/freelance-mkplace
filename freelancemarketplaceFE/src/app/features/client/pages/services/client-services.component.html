<app-page-header title="Services" subtitle="Services approuvés que vous pouvez demander." />

<mat-form-field appearance="outline" class="search">
  <mat-label>Rechercher</mat-label>
  <input matInput [formControl]="searchControl" placeholder="Titre, freelancer…" />
</mat-form-field>

<div class="grid">
  @for (service of filteredServices(); track service.id) {
    <mat-card>
      <mat-card-header>
        <mat-card-title>{{ service.title }}</mat-card-title>
        <mat-card-subtitle>par {{ service.freelancerName }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>{{ service.description }}</p>
        <p class="price">{{ service.price | currency: 'EUR' }}</p>
      </mat-card-content>
      <mat-card-actions>
        <a mat-button [routerLink]="['/client/freelancers', service.freelancerId]">Portfolio & avis</a>
        <a
          mat-flat-button
          color="primary"
          [routerLink]="['/client/orders/new']"
          [queryParams]="{ serviceId: service.id }"
          >Demander</a
        >
      </mat-card-actions>
    </mat-card>
  } @empty {
    <p class="empty">Aucun service trouvé.</p>
  }
</div>
