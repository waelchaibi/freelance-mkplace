<mat-sidenav-container class="app-shell">
  <mat-sidenav mode="side" opened class="app-sidenav">
    <div class="app-brand">
      <img src="/assets/dcb-logo.png" alt="DCB Authority Group" class="app-brand__logo" width="44" height="44" />
      <div class="app-brand__text">
        <span class="app-brand__title">DCB FreelanceHub</span>
        <span class="app-brand__role">Espace freelancer</span>
      </div>
    </div>
    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.route.endsWith('dashboard') }"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="app-topbar">
      <span class="topbar-user">{{ auth.getUser()?.name }}</span>
      <span class="topbar-role">Freelancer</span>
      <span class="spacer"></span>
      <app-notification-bell notificationsRoute="/freelancer/notifications" />
      <button mat-button type="button" (click)="auth.logout()">Déconnexion</button>
    </mat-toolbar>
    <main class="app-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
