<app-page-header title="Publier un service" subtitle="Votre service sera visible par les clients après validation par l'admin." />

<mat-card>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <mat-form-field appearance="outline">
        <mat-label>Titre</mat-label>
        <input matInput formControlName="title" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <textarea matInput rows="4" formControlName="description"></textarea>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Prix (TND)</mat-label>
        <input matInput type="number" formControlName="price" />
      </mat-form-field>

      <div class="actions">
        <button mat-flat-button color="primary" type="submit" [disabled]="loading">Soumettre</button>
        <a mat-button routerLink="/freelancer/services">Annuler</a>
      </div>
    </form>
  </mat-card-content>
</mat-card>
