<app-page-header title="Publish a service" subtitle="Your service will be visible to clients after admin approval." />

<mat-card>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <mat-form-field appearance="outline">
        <mat-label>Title</mat-label>
        <input matInput formControlName="title" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <textarea matInput rows="4" formControlName="description"></textarea>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Price (TND)</mat-label>
        <input matInput type="number" formControlName="price" />
      </mat-form-field>

      <div class="actions">
        <button mat-flat-button color="primary" type="submit" [disabled]="loading">Submit</button>
        <a mat-button routerLink="/freelancer/services">Cancel</a>
      </div>
    </form>
  </mat-card-content>
</mat-card>
