<app-page-header title="Mes services" subtitle="Services que vous avez publiés. L'admin doit les approuver avant que les clients puissent les demander.">
  <a mat-flat-button color="primary" routerLink="/freelancer/services/new">Nouveau service</a>
</app-page-header>

@if (myServices().length === 0) {
  <mat-card><mat-card-content>Aucun service pour le moment. Publiez votre première offre.</mat-card-content></mat-card>
} @else {
  <div class="grid">
    @for (service of myServices(); track service.id) {
      <mat-card>
        <mat-card-header>
          <mat-card-title>{{ service.title }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p>{{ service.description }}</p>
          <p class="price">{{ service.price | number: '1.2-2' }} TND</p>
          <app-status-chip [status]="service.status" />
        </mat-card-content>
      </mat-card>
    }
  </div>
}
