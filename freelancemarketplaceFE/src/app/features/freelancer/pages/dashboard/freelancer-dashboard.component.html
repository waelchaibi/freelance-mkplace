<app-page-header title="Freelancer Dashboard" subtitle="Manage your services and assigned tasks." />

<div class="stats">
  <mat-card>
    <mat-card-title>Assigned orders</mat-card-title>
    <mat-card-content><span class="stat">{{ orders().length }}</span></mat-card-content>
  </mat-card>
  <mat-card>
    <mat-card-title>In progress</mat-card-title>
    <mat-card-content
      ><span class="stat">{{ countOrders(OrderStatus.IN_PROGRESS) }}</span></mat-card-content
    >
  </mat-card>
  <mat-card>
    <mat-card-title>Pending services</mat-card-title>
    <mat-card-content><span class="stat">{{ pendingServices() }}</span></mat-card-content>
  </mat-card>
  <mat-card>
    <mat-card-title>Approved services</mat-card-title>
    <mat-card-content><span class="stat">{{ approvedServices() }}</span></mat-card-content>
  </mat-card>
</div>

<div class="actions">
  <a mat-flat-button color="primary" routerLink="/freelancer/services/new">Publish service</a>
  <a mat-stroked-button routerLink="/freelancer/orders">View assigned orders</a>
</div>
