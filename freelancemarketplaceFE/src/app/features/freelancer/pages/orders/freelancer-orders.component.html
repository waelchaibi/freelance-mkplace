<app-page-header title="Projets assignés" subtitle="Tâches qui vous ont été confiées par l'admin." />

<mat-form-field appearance="outline" class="filter">
  <mat-label>Statut</mat-label>
  <mat-select [formControl]="statusControl">
    @for (opt of statusOptions; track opt.value) {
      <mat-option [value]="opt.value">{{ opt.label }}</mat-option>
    }
  </mat-select>
</mat-form-field>

<table mat-table [dataSource]="filteredOrders()" class="orders-table">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>#</th>
    <td mat-cell *matCellDef="let row">{{ row.id }}</td>
  </ng-container>

  <ng-container matColumnDef="client">
    <th mat-header-cell *matHeaderCellDef>Client</th>
    <td mat-cell *matCellDef="let row">{{ row.clientName }}</td>
  </ng-container>

  <ng-container matColumnDef="service">
    <th mat-header-cell *matHeaderCellDef>Service</th>
    <td mat-cell *matCellDef="let row">{{ row.serviceTitle ?? 'Demande personnalisée' }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Statut</th>
    <td mat-cell *matCellDef="let row"><app-status-chip [status]="row.status" /></td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let row">
      <a mat-button (click)="$event.stopPropagation(); openOrder(row)">Ouvrir</a>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr
    mat-row
    *matRowDef="let row; columns: displayedColumns"
    class="clickable-row"
    (click)="openOrder(row)"
  ></tr>
</table>

@if (filteredOrders().length === 0) {
  <p class="empty">Aucun projet assigné pour ce filtre.</p>
}
