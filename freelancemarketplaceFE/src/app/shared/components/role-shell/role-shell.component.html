<mat-toolbar color="primary" class="role-toolbar">
  <span>{{ title() }}</span>
  <span class="spacer"></span>
  <span class="user">{{ auth.getUser()?.name }}</span>
  <button mat-button type="button" (click)="auth.logout()">Logout</button>
</mat-toolbar>

<main class="role-content">
  <mat-card>
    <mat-card-title>{{ title() }}</mat-card-title>
    <mat-card-content>
      <p>{{ subtitle() }}</p>
    </mat-card-content>
  </mat-card>
</main>
