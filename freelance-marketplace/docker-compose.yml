version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: freelance-postgres
    environment:
      POSTGRES_DB: freelance_marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: freelance-app
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/freelance_marketplace
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_CORS_ALLOWED_ORIGINS: http://localhost:4200,http://127.0.0.1:4200
    ports:
      - "8080:8080"

volumes:
  postgres_data:
